version: "3.9"

services:

  # ──────────────────────────────────────────────
  # OpenLDAP — directory server
  # ──────────────────────────────────────────────
  openldap:
    image: osixia/openldap:1.5.0
    container_name: keycloak-lab-openldap
    environment:
      LDAP_ORGANISATION: "${LDAP_ORGANISATION}"
      LDAP_DOMAIN: "${LDAP_DOMAIN}"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD}"
      LDAP_READONLY_USER: "${LDAP_READONLY_USER}"
      LDAP_READONLY_USER_USERNAME: "${LDAP_READONLY_USER_USERNAME}"
      LDAP_READONLY_USER_PASSWORD: "${LDAP_READONLY_USER_PASSWORD}"
      LDAP_TLS: "false"
    ports:
      - "${LDAP_PORT}:389"
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
      - ./ldap/bootstrap:/container/service/slapd/assets/config/bootstrap/ldif/custom:ro
    command: --copy-service --loglevel warning
    networks:
      - iam-net
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-b", "dc=iam-lab,dc=local", "-D", "cn=admin,dc=iam-lab,dc=local", "-w", "${LDAP_ADMIN_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────
  # phpLDAPadmin — LDAP browser UI
  # ──────────────────────────────────────────────
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: keycloak-lab-phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "${PHPLDAPADMIN_PORT}:80"
    depends_on:
      openldap:
        condition: service_healthy
    networks:
      - iam-net

  # ──────────────────────────────────────────────
  # Keycloak — Identity Provider
  # ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak-lab-keycloak
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      # Dev mode — embedded H2 DB, no production hardening needed for a lab
      KC_DB: "dev-file"
    command: start-dev
    ports:
      - "${KEYCLOAK_PORT}:8080"
    depends_on:
      openldap:
        condition: service_healthy
    networks:
      - iam-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/realms/master || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ──────────────────────────────────────────────
  # SimpleSAMLphp — SAML 2.0 Service Provider
  # ──────────────────────────────────────────────
  simplesamlphp:
    build:
      context: ./simplesamlphp
      dockerfile: Dockerfile
    container_name: keycloak-lab-simplesamlphp
    environment:
      SSP_ADMIN_PASSWORD: "${SSP_ADMIN_PASSWORD}"
      SSP_SECRET_SALT: "${SSP_SECRET_SALT}"
      # Full external URL so SSP generates correct entity IDs and ACS URLs
      # (host port 8082 → container port 80 via Docker port mapping).
      SSP_BASEURLPATH: "http://localhost:${SSP_PORT}/simplesaml/"
    ports:
      - "${SSP_PORT}:80"
    volumes:
      - ./simplesamlphp/config.php:/opt/simplesamlphp/config/config.php:ro
      - ./simplesamlphp/config/authsources.php:/opt/simplesamlphp/config/authsources.php:ro
      - ./simplesamlphp/metadata/saml20-idp-remote.php:/opt/simplesamlphp/metadata/saml20-idp-remote.php:ro
    networks:
      - iam-net

volumes:
  ldap-data:
  ldap-config:

networks:
  iam-net:
    driver: bridge
